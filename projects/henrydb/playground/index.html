<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HenryDB — Interactive SQL Playground</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}
header {
  padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.75rem;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
header h1 span { color: var(--accent); }
.badge {
  font-size: 0.7rem; padding: 0.12rem 0.45rem; border-radius: 2rem;
  background: var(--accent); color: var(--bg); font-weight: 600;
}
.subtitle { color: var(--text-dim); font-size: 0.8rem; }
.stats { margin-left: auto; color: var(--text-dim); font-size: 0.75rem; font-family: var(--font-mono); }
.app-layout { flex: 1; display: flex; overflow: hidden; }
.sidebar {
  width: 220px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
  flex-shrink: 0; background: var(--surface);
}
.sidebar-section { border-bottom: 1px solid var(--border); }
.sidebar-section h3 {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-dim); padding: 0.5rem 0.6rem 0.25rem; cursor: pointer;
  user-select: none;
}
.section-body { padding: 0 0.4rem 0.4rem; }
.table-item {
  padding: 0.25rem 0.4rem; border-radius: 4px; cursor: pointer;
  font-size: 0.78rem; font-family: var(--font-mono);
  display: flex; align-items: center; gap: 0.3rem;
}
.table-item:hover { background: rgba(88,166,255,0.1); }
.table-item .icon { font-size: 0.65rem; }
.table-item.active { background: rgba(88,166,255,0.15); color: var(--accent); }
.column-list {
  margin-left: 1.2rem; font-size: 0.7rem; color: var(--text-dim);
  font-family: var(--font-mono); padding: 0.1rem 0;
}
.column-list .col-type { color: var(--purple); margin-left: 0.2rem; }
.history-item {
  padding: 0.2rem 0.4rem; border-radius: 4px; cursor: pointer;
  font-size: 0.7rem; font-family: var(--font-mono); color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-item:hover { background: rgba(88,166,255,0.1); color: var(--text); }
.main-area {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  padding: 0.75rem 1.5rem; gap: 0.5rem;
}
.editor-toolbar { display: flex; align-items: center; gap: 0.5rem; }
.editor-toolbar button {
  padding: 0.3rem 0.75rem; border-radius: 5px; border: 1px solid var(--border);
  background: var(--green); color: #fff; font-weight: 600;
  cursor: pointer; font-size: 0.78rem;
}
.editor-toolbar button:hover { opacity: 0.9; }
.editor-toolbar button.secondary { background: var(--surface); color: var(--text); }
.editor-toolbar .hint { color: var(--text-dim); font-size: 0.7rem; margin-left: auto; }
#editor {
  width: 100%; min-height: 90px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--font-mono); font-size: 0.82rem;
  padding: 0.6rem; resize: vertical; line-height: 1.5; tab-size: 2;
}
#editor:focus { outline: none; border-color: var(--accent); }
.output-header { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; }
.tabs { display: flex; gap: 0; }
.tab {
  padding: 0.3rem 0.6rem; font-size: 0.78rem; cursor: pointer;
  color: var(--text-dim); border-bottom: 2px solid transparent;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-color: var(--accent); }
.timing { margin-left: auto; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); }
#output {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.6rem; overflow: auto;
  font-family: var(--font-mono); font-size: 0.78rem; line-height: 1.5;
  min-height: 160px;
}
.result-table { width: 100%; border-collapse: collapse; margin-bottom: 0.3rem; }
.result-table th {
  text-align: left; padding: 0.25rem 0.5rem; border-bottom: 2px solid var(--accent);
  color: var(--accent); font-weight: 600; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.result-table td { padding: 0.2rem 0.5rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
.result-table tr:hover td { background: rgba(88,166,255,0.05); }
.result-table td.null { color: var(--text-dim); font-style: italic; }
.result-table td.num { color: var(--yellow); }
.result-ok { color: var(--green); }
.result-error { color: var(--red); }
.result-info { color: var(--text-dim); font-size: 0.75rem; }
.plan-tree { padding: 0.3rem; }
.plan-node { margin-left: 1.2rem; padding: 0.2rem 0; position: relative; }
.plan-node::before {
  content: ''; position: absolute; left: -0.8rem; top: 0;
  width: 0.8rem; height: 0.8rem; border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.plan-op {
  display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px;
  font-size: 0.75rem; font-weight: 600;
  background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--accent);
}
.plan-op.scan { background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.2); color: var(--green); }
.plan-op.filter { background: rgba(210,153,34,0.1); border-color: rgba(210,153,34,0.2); color: var(--yellow); }
.plan-detail { font-size: 0.7rem; color: var(--text-dim); margin-left: 0.4rem; }
.examples { margin-top: 0.25rem; }
.examples summary { cursor: pointer; color: var(--accent); font-size: 0.78rem; user-select: none; }
.example-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.3rem; margin-top: 0.4rem;
}
.example-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 0.4rem; cursor: pointer;
}
.example-card:hover { border-color: var(--accent); }
.example-card h4 { font-size: 0.72rem; color: var(--accent); margin-bottom: 0.1rem; }
.example-card code {
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim);
  display: block; white-space: pre-wrap; max-height: 40px; overflow: hidden;
}
footer {
  padding: 0.4rem 1.5rem; border-top: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.65rem; text-align: center;
}
footer a { color: var(--accent); text-decoration: none; }
/* Charts */
.chart-container { padding: 0.5rem; }
/* Tutorials */
.tutorial-card {
  padding: 0.3rem 0.5rem; border-radius: 4px; cursor: pointer;
  font-size: 0.78rem; display: flex; align-items: center; gap: 0.3rem;
}
.tutorial-card:hover { background: rgba(88,166,255,0.1); }
.tutorial-card .count { color: var(--text-dim); font-size: 0.65rem; margin-left: auto; }
.lesson-panel {
  background: var(--surface); border: 1px solid var(--accent); border-radius: 6px;
  padding: 0.75rem; margin-bottom: 0.5rem;
}
.lesson-panel h4 { color: var(--accent); font-size: 0.85rem; margin-bottom: 0.3rem; }
.lesson-panel p { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 0.4rem; }
.lesson-panel .challenge { color: var(--yellow); font-weight: 600; font-size: 0.8rem; }
.lesson-panel .hint { color: var(--text-dim); font-size: 0.72rem; font-family: var(--font-mono); }
.lesson-nav { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.lesson-nav button {
  padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.75rem;
}
.lesson-nav button:hover { border-color: var(--accent); }
.lesson-nav button.primary { background: var(--accent); color: var(--bg); }
.lesson-success { color: var(--green); font-weight: 600; font-size: 0.85rem; padding: 0.3rem 0; }
.chart-container svg { width: 100%; max-height: 300px; }
.chart-bar { transition: opacity 0.15s; }
.chart-bar:hover { opacity: 0.8; }
.chart-label { fill: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }
.chart-value { fill: var(--text); font-size: 10px; font-family: var(--font-mono); }
.chart-axis { stroke: var(--border); }
.chart-title { fill: var(--text-dim); font-size: 12px; }
@media (max-width: 768px) { .sidebar { display: none; } .main-area { padding: 0.5rem; } }
</style>
</head>
<body>
<header>
  <h1>🐘 <span>Henry</span>DB</h1>
  <span class="badge">v1.0</span>
  <span class="subtitle">Interactive SQL Playground</span>
  <span class="stats" id="db-stats"></span>
</header>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>🎓 Tutorials</h3>
      <div class="section-body" id="tutorial-list"></div>
    </div>
    <div class="sidebar-section">
      <h3>📋 Schema</h3>
      <div class="section-body" id="schema-list"></div>
    </div>
    <div class="sidebar-section">
      <h3>🕐 History</h3>
      <div class="section-body" id="history-list"></div>
    </div>
  </aside>
  <div class="main-area">
    <div class="editor-toolbar">
      <button onclick="runQuery()">▶ Run</button>
      <button class="secondary" onclick="clearOutput()">Clear</button>
      <button class="secondary" onclick="resetDb()">🔄 Reset</button>
      <button class="secondary" onclick="formatQuery()">✨ Format</button>
      <span class="hint">⌘Enter to run</span>
    </div>
    <textarea id="editor" spellcheck="false" rows="4">SELECT name, score, grade FROM demo ORDER BY score DESC;</textarea>
    <div class="output-header">
      <div class="tabs">
        <div class="tab active" data-tab="results" onclick="switchTab('results')">Results</div>
        <div class="tab" data-tab="chart" onclick="switchTab('chart')">📊 Chart</div>
        <div class="tab" data-tab="plan" onclick="switchTab('plan')">Plan</div>
      </div>
      <span class="timing" id="timing"></span>
    </div>
    <div id="output"><span class="result-info">Run a query to see results.</span></div>
    <details class="examples">
      <summary>📚 Example Queries</summary>
      <div class="example-grid" id="examples"></div>
    </details>
  </div>
</div>
<footer>108K+ LOC · 4,295 tests · 209 modules · 115KB browser bundle · Built from scratch in JS</footer>
<script type="module">
import { Database } from './henrydb.bundle.js';
import { parse, formatSQL } from './henrydb.bundle.js';
import { tutorials, getLesson } from './tutorial.js';
let db, queryHistory = [], lastPlan = null, lastRows = null, activeTab = 'results';
let currentTutorial = null, currentLessonIdx = 0, lessonDb = null;

const CHART_COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f0883e','#79c0ff','#56d364','#e3b341','#ff7b72'];

function detectChartable(rows) {
  if (!rows || rows.length < 2 || rows.length > 50) return null;
  const cols = Object.keys(rows[0]);
  if (cols.length < 2) return null;
  // Find a label column (string/text) and numeric columns
  let labelCol = null;
  const numCols = [];
  for (const col of cols) {
    const sample = rows[0][col];
    if (typeof sample === 'string' && !labelCol) labelCol = col;
    else if (typeof sample === 'number') numCols.push(col);
  }
  // Fallback: first col as label even if number
  if (!labelCol && cols.length >= 2) {
    labelCol = cols[0];
    numCols.length = 0;
    for (const col of cols.slice(1)) {
      if (typeof rows[0][col] === 'number') numCols.push(col);
    }
  }
  if (!labelCol || numCols.length === 0) return null;
  return { labelCol, numCols: numCols.slice(0, 3) }; // max 3 series
}

function renderChart(rows) {
  const info = detectChartable(rows);
  if (!info) return '<span class="result-info">No chartable data. Needs a text column + numeric column(s), 2-50 rows.</span>';
  
  const { labelCol, numCols } = info;
  const labels = rows.map(r => String(r[labelCol]).substring(0, 15));
  const series = numCols.map(col => rows.map(r => r[col] || 0));
  const allVals = series.flat();
  const maxVal = Math.max(...allVals, 1);
  
  const W = 600, H = 280, pad = { top: 30, right: 20, bottom: 60, left: 60 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = labels.length;
  const barGroupW = chartW / n;
  const barW = Math.min(barGroupW * 0.7 / numCols.length, 40);
  const gap = (barGroupW - barW * numCols.length) / 2;
  
  let svg = `<div class="chart-container"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  
  // Y axis gridlines
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + chartH * (1 - i/4);
    const val = (maxVal * i/4).toFixed(maxVal > 100 ? 0 : 1);
    svg += `<line x1="${pad.left}" y1="${y}" x2="${W-pad.right}" y2="${y}" stroke="${i===0?'var(--border)':'rgba(48,54,61,0.5)'}" stroke-width="1"/>`;
    svg += `<text x="${pad.left-8}" y="${y+4}" text-anchor="end" class="chart-label">${val}</text>`;
  }
  
  // Bars
  for (let si = 0; si < series.length; si++) {
    const color = CHART_COLORS[si % CHART_COLORS.length];
    for (let i = 0; i < n; i++) {
      const val = series[si][i];
      const barH = (val / maxVal) * chartH;
      const x = pad.left + i * barGroupW + gap + si * barW;
      const y = pad.top + chartH - barH;
      svg += `<rect class="chart-bar" x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="2"/>`;
      if (n <= 15) {
        svg += `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" class="chart-value">${val >= 1000 ? (val/1000).toFixed(1)+'K' : val % 1 === 0 ? val : val.toFixed(1)}</text>`;
      }
    }
  }
  
  // X axis labels
  for (let i = 0; i < n; i++) {
    const x = pad.left + i * barGroupW + barGroupW / 2;
    svg += `<text x="${x}" y="${H - pad.bottom + 15}" text-anchor="middle" class="chart-label" transform="rotate(-30 ${x} ${H - pad.bottom + 15})">${esc(labels[i])}</text>`;
  }
  
  // Legend
  if (numCols.length > 1) {
    for (let si = 0; si < numCols.length; si++) {
      const lx = pad.left + si * 120;
      svg += `<rect x="${lx}" y="8" width="10" height="10" fill="${CHART_COLORS[si]}" rx="2"/>`;
      svg += `<text x="${lx + 14}" y="17" class="chart-label">${esc(numCols[si])}</text>`;
    }
  }
  
  svg += '</svg></div>';
  return svg;
}

function initDb() {
  db = new Database();
  db.execute('CREATE TABLE demo (id INTEGER PRIMARY KEY, name TEXT NOT NULL, score INTEGER, grade TEXT, enrolled TEXT)');
  db.execute('CREATE INDEX idx_demo_score ON demo(score)');
  [[1,'Alice',95,'A','2025-09-01'],[2,'Bob',87,'B','2025-09-01'],[3,'Charlie',92,'A','2025-09-02'],
   [4,'Diana',78,'C','2025-09-02'],[5,'Eve',88,'B','2025-09-03'],[6,'Frank',91,'A','2025-09-03'],
   [7,'Grace',85,'B','2025-09-04'],[8,'Hank',73,'C','2025-09-04'],[9,'Ivy',96,'A','2025-09-05'],
   [10,'Jack',82,'B','2025-09-05']].forEach(([i,n,s,g,e])=>db.execute(`INSERT INTO demo VALUES (${i},'${n}',${s},'${g}','${e}')`));
  db.execute('CREATE TABLE products (id INTEGER PRIMARY KEY, name TEXT, price REAL, category TEXT, in_stock INTEGER)');
  [[1,'Laptop',999.99,'Electronics',15],[2,'Headphones',79.99,'Electronics',42],[3,'Desk Chair',249.99,'Furniture',8],
   [4,'Notebook',4.99,'Office',200],[5,'Monitor',349.99,'Electronics',12],[6,'Keyboard',59.99,'Electronics',35],
   [7,'Standing Desk',599.99,'Furniture',5],[8,'Pen Set',12.99,'Office',150],[9,'Webcam',89.99,'Electronics',20],
   [10,'Bookshelf',149.99,'Furniture',10]].forEach(([i,n,p,c,s])=>db.execute(`INSERT INTO products VALUES (${i},'${n}',${p},'${c}',${s})`));
  db.execute('CREATE TABLE orders (id INTEGER PRIMARY KEY, product_id INTEGER, customer TEXT, quantity INTEGER, order_date TEXT)');
  [[1,1,'Alice',1,'2026-01-15'],[2,2,'Bob',2,'2026-01-16'],[3,5,'Alice',1,'2026-01-17'],
   [4,3,'Charlie',1,'2026-02-01'],[5,6,'Diana',3,'2026-02-05'],[6,4,'Bob',10,'2026-02-10'],
   [7,1,'Eve',1,'2026-02-15'],[8,9,'Frank',2,'2026-03-01'],[9,2,'Alice',1,'2026-03-05'],
   [10,7,'Charlie',1,'2026-03-10']].forEach(([i,p,c,q,d])=>db.execute(`INSERT INTO orders VALUES (${i},${p},'${c}',${q},'${d}')`));
  refreshSchema(); updateStats();
}
function refreshSchema() {
  const el = document.getElementById('schema-list'); el.innerHTML = '';
  try {
    const t = db.execute('SHOW TABLES');
    t.rows.forEach(row => {
      const name = row.table_name || row.name || Object.values(row)[0];
      const item = document.createElement('div');
      item.className = 'table-item';
      item.innerHTML = `<span class="icon">📄</span> ${esc(name)}`;
      item.onclick = () => {
        const ex = item.nextElementSibling;
        if (ex?.className === 'column-list') { ex.remove(); item.classList.remove('active'); return; }
        document.querySelectorAll('.column-list').forEach(e=>e.remove());
        document.querySelectorAll('.table-item.active').forEach(e=>e.classList.remove('active'));
        item.classList.add('active');
        try {
          const peek = db.execute(`SELECT * FROM ${name} LIMIT 1`);
          if (peek.rows?.length) {
            const div = document.createElement('div'); div.className = 'column-list';
            Object.entries(peek.rows[0]).forEach(([k,v]) => {
              div.innerHTML += `<div>├ ${esc(k)}<span class="col-type"> ${v===null?'null':typeof v}</span></div>`;
            });
            item.after(div);
          }
        } catch(e) {}
      };
      el.appendChild(item);
    });
  } catch(e) {}
}
function updateStats() {
  try { const t = db.execute('SHOW TABLES'); document.getElementById('db-stats').textContent = `${t.rows.length} tables · ${queryHistory.length} queries`; } catch(e) {}
}
function addHistory(sql, ms) {
  queryHistory.unshift({ sql: sql.trim(), ms }); if (queryHistory.length > 30) queryHistory.pop();
  const el = document.getElementById('history-list'); el.innerHTML = '';
  queryHistory.slice(0, 15).forEach(h => {
    const item = document.createElement('div'); item.className = 'history-item';
    item.textContent = h.sql.substring(0, 50); item.title = h.sql;
    item.onclick = () => { document.getElementById('editor').value = h.sql; runQuery(); };
    el.appendChild(item);
  });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderTable(rows) {
  if (!rows?.length) return '<span class="result-info">No rows.</span>';
  const cols = Object.keys(rows[0]), max = Math.min(rows.length, 200);
  let h = '<table class="result-table"><thead><tr>';
  cols.forEach(c => h += `<th>${esc(c)}</th>`);
  h += '</tr></thead><tbody>';
  for (let i = 0; i < max; i++) {
    h += '<tr>';
    cols.forEach(c => {
      const v = rows[i][c];
      if (v === null || v === undefined) h += '<td class="null">NULL</td>';
      else if (typeof v === 'number') h += `<td class="num">${v}</td>`;
      else h += `<td>${esc(v)}</td>`;
    });
    h += '</tr>';
  }
  h += `</tbody></table><span class="result-info">${rows.length} row${rows.length!==1?'s':''}${rows.length>200?' (showing 200)':''}</span>`;
  return h;
}
function renderPlan(plan) {
  if (!plan?.length) return '<span class="result-info">No plan.</span>';
  let h = '<div class="plan-tree">';
  plan.forEach(s => {
    const cls = s.operation.includes('SCAN') ? ' scan' : s.operation.includes('FILTER') ? ' filter' : '';
    h += `<div class="plan-node"><span class="plan-op${cls}">${esc(s.operation)}</span>`;
    const d = [];
    if (s.table) d.push(`table: ${s.table}`);
    if (s.index) d.push(`idx: ${s.index}`);
    if (s.estimated_rows !== undefined) d.push(`~${s.estimated_rows} rows`);
    if (s.condition) d.push(s.condition);
    if (d.length) h += `<span class="plan-detail">${esc(d.join(' · '))}</span>`;
    h += '</div>';
  });
  return h + '</div>';
}
window.runQuery = function() {
  const sql = document.getElementById('editor').value.trim();
  if (!sql) return;
  const stmts = sql.split(';').map(s=>s.trim()).filter(Boolean);
  let html = ''; const t0 = performance.now(); lastPlan = null;
  for (const s of stmts) {
    try {
      const r = db.execute(s);
      if (r.type === 'PLAN') { lastPlan = r.plan; html += renderPlan(r.plan); switchTab('plan'); }
      else if (r.type === 'OK') html += `<div class="result-ok">✓ ${esc(r.message)}</div>`;
      else if (r.rows) {
        lastRows = r.rows;
        html += renderTable(r.rows);
        try { const p = db.execute('EXPLAIN ' + s); if (p.plan) lastPlan = p.plan; } catch(e) {}
      }
      else html += '<div class="result-ok">✓ OK</div>';
    } catch(e) { html += `<div class="result-error">✗ ${esc(e.message)}</div>`; }
    html += '<br>';
  }
  const ms = (performance.now()-t0).toFixed(1);
  document.getElementById('output').innerHTML = html;
  document.getElementById('timing').textContent = `${ms}ms`;
  addHistory(sql, ms); refreshSchema(); updateStats();
};
window.switchTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const el = document.getElementById('output');
  if (tab === 'plan' && lastPlan) el.innerHTML = renderPlan(lastPlan);
  else if (tab === 'chart' && lastRows) el.innerHTML = renderChart(lastRows);
};
window.clearOutput = function() {
  document.getElementById('output').innerHTML = '<span class="result-info">Cleared.</span>';
  document.getElementById('timing').textContent = ''; lastPlan = null;
};
window.resetDb = function() {
  initDb(); queryHistory.length = 0;
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('output').innerHTML = '<span class="result-ok">✓ Database reset.</span>';
};
window.formatQuery = function() {
  const editor = document.getElementById('editor');
  const sql = editor.value.trim();
  if (!sql) return;
  try {
    const stmts = sql.split(';').map(s => s.trim()).filter(Boolean);
    const formatted = stmts.map(s => { try { return formatSQL(parse(s)); } catch(e) { return s + ';'; } }).join('\n\n');
    editor.value = formatted;
  } catch(e) { /* leave as-is if format fails */ }
};
// Tutorials
function initTutorials() {
  const list = document.getElementById('tutorial-list');
  tutorials.forEach(t => {
    const card = document.createElement('div');
    card.className = 'tutorial-card';
    card.innerHTML = `${t.title}<span class="count">${t.lessons.length} lessons</span>`;
    card.onclick = () => { currentTutorial = t.id; currentLessonIdx = 0; showLesson(); };
    list.appendChild(card);
  });
}
function showLesson() {
  const lesson = getLesson(currentTutorial, currentLessonIdx);
  if (!lesson) { window.endTutorial(); return; }
  if (lesson.setup) {
    lessonDb = new Database();
    lesson.setup.split(';').filter(Boolean).forEach(s => { try { lessonDb.execute(s.trim()); } catch(e) {} });
  }
  let panel = document.getElementById('lesson-panel');
  if (!panel) {
    panel = document.createElement('div'); panel.id = 'lesson-panel'; panel.className = 'lesson-panel';
    document.getElementById('editor').parentElement.insertBefore(panel, document.getElementById('editor'));
  }
  panel.innerHTML = `<h4>${lesson.tutorialTitle} — ${lesson.index+1}/${lesson.total}: ${lesson.title}</h4>
    <p>${lesson.description}</p><p class="challenge">Challenge: ${lesson.challenge}</p>
    <p class="hint">💡 <code>${lesson.hint}</code></p>
    <div class="lesson-nav">${lesson.index>0?'<button onclick="prevLesson()">← Prev</button>':''}
    <button onclick="showSolution()">Solution</button>
    <button onclick="checkAnswer()" class="primary">✓ Check</button>
    <button onclick="endTutorial()">✕ Exit</button></div><div id="lesson-feedback"></div>`;
  document.getElementById('editor').value = '-- Write your query here\n';
}
window.checkAnswer = function() {
  const lesson = getLesson(currentTutorial, currentLessonIdx);
  if (!lesson) return;
  try {
    const r = (lessonDb||db).execute(document.getElementById('editor').value.trim().replace(/;$/,''));
    const fb = document.getElementById('lesson-feedback');
    if (lesson.check(r.rows)) {
      fb.innerHTML = '<div class="lesson-success">🎉 Correct!</div>';
      document.getElementById('output').innerHTML = renderTable(r.rows);
      setTimeout(() => { currentLessonIdx++; showLesson(); }, 1500);
    } else {
      fb.innerHTML = '<div class="result-error">Not quite — try again.</div>';
      document.getElementById('output').innerHTML = renderTable(r.rows);
    }
  } catch(e) { document.getElementById('lesson-feedback').innerHTML = `<div class="result-error">${esc(e.message)}</div>`; }
};
window.showSolution = function() { const l = getLesson(currentTutorial, currentLessonIdx); if(l) document.getElementById('editor').value = l.solution; };
window.prevLesson = function() { if(currentLessonIdx>0){currentLessonIdx--;showLesson();} };
window.endTutorial = function() { currentTutorial=null; lessonDb=null; const p=document.getElementById('lesson-panel'); if(p)p.remove(); };
initTutorials();
const examples = [
  {t:'Basic SELECT',s:'SELECT * FROM demo ORDER BY score DESC;'},
  {t:'Aggregates',s:"SELECT grade, COUNT(*) as count,\n  ROUND(AVG(score),1) as avg\nFROM demo GROUP BY grade\nORDER BY avg DESC;"},
  {t:'Window: Ranking',s:"SELECT name, score,\n  ROW_NUMBER() OVER (ORDER BY score DESC) as rank\nFROM demo;"},
  {t:'Running Total',s:"SELECT name, score,\n  SUM(score) OVER (ORDER BY name) as running\nFROM demo;"},
  {t:'CTE',s:"WITH stats AS (\n  SELECT category, COUNT(*) as cnt,\n    ROUND(AVG(price),2) as avg_price\n  FROM products GROUP BY category\n)\nSELECT * FROM stats ORDER BY avg_price DESC;"},
  {t:'JOIN',s:"SELECT o.id, p.name, o.customer,\n  o.quantity * p.price as total\nFROM orders o\nJOIN products p ON o.product_id = p.id\nORDER BY total DESC;"},
  {t:'CASE',s:"SELECT name, price,\n  CASE WHEN price>500 THEN 'Premium'\n    WHEN price>100 THEN 'Mid-range'\n    ELSE 'Budget' END as tier\nFROM products ORDER BY price DESC;"},
  {t:'EXISTS',s:"SELECT name FROM products p\nWHERE EXISTS (\n  SELECT 1 FROM orders o\n  WHERE o.product_id = p.id);"},
  {t:'UNION',s:"SELECT name,'student' as type FROM demo WHERE score>90\nUNION\nSELECT name,'product' FROM products WHERE price>200;"},
  {t:'CREATE+INSERT',s:"CREATE TABLE notes (id INTEGER PRIMARY KEY, text TEXT);\nINSERT INTO notes VALUES (1,'Hello HenryDB!');\nINSERT INTO notes VALUES (2,'SQL is fun');\nSELECT * FROM notes;"},
  {t:'EXPLAIN',s:"EXPLAIN SELECT p.name, SUM(o.quantity)\nFROM products p\nJOIN orders o ON o.product_id=p.id\nGROUP BY p.name;"},
  {t:'Subquery',s:"SELECT customer, SUM(total) as spent FROM (\n  SELECT o.customer, o.quantity*p.price as total\n  FROM orders o JOIN products p ON o.product_id=p.id\n) sub GROUP BY customer ORDER BY spent DESC;"},
];
const grid = document.getElementById('examples');
examples.forEach(e => {
  const c = document.createElement('div'); c.className = 'example-card';
  c.innerHTML = `<h4>${e.t}</h4><code>${esc(e.s)}</code>`;
  c.onclick = () => { document.getElementById('editor').value = e.s; runQuery(); };
  grid.appendChild(c);
});
document.getElementById('editor').addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); runQuery(); }
  if (e.key==='Tab') { e.preventDefault(); const t=e.target,s=t.selectionStart; t.value=t.value.substring(0,s)+'  '+t.value.substring(t.selectionEnd); t.selectionStart=t.selectionEnd=s+2; }
});
initDb(); runQuery();
</script>
