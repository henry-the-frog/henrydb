name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'playground/**'
      - 'src/**'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Build bundle
        run: |
          npx esbuild playground/entry.js \
            --bundle --format=esm --minify \
            --outfile=playground/henrydb.bundle.js \
            --platform=browser \
            --external:node:fs --external:node:path \
            --external:node:crypto --external:node:net \
            --external:node:http --external:node:tls --external:node:os
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
